<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediTok — Voice Recorder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      text-align: center;
    }
    .logo { font-size: 14px; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-size: 22px; color: #1a202c; margin-bottom: 6px; }
    .subtitle { color: #718096; font-size: 14px; margin-bottom: 32px; }
    .mic-btn {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: none;
      background: #3b82f6;
      color: white;
      font-size: 36px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 4px 12px rgba(59,130,246,0.4);
    }
    .mic-btn:hover { transform: scale(1.05); }
    .mic-btn.recording {
      background: #ef4444;
      animation: pulse 1.2s infinite;
      box-shadow: 0 4px 12px rgba(239,68,68,0.4);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .status {
      font-size: 15px;
      color: #4a5568;
      margin-bottom: 8px;
      min-height: 22px;
    }
    .timer {
      font-size: 28px;
      font-weight: bold;
      color: #1a202c;
      margin-bottom: 24px;
      font-variant-numeric: tabular-nums;
    }
    .timer.recording { color: #ef4444; }
    audio {
      width: 100%;
      margin-bottom: 16px;
      border-radius: 8px;
      display: none;
    }
    .download-btn {
      display: none;
      width: 100%;
      padding: 12px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
    }
    .download-btn:hover { background: #059669; }
    .instructions {
      margin-top: 24px;
      padding: 16px;
      background: #f7fafc;
      border-radius: 8px;
      text-align: left;
    }
    .instructions p { font-size: 13px; color: #718096; line-height: 1.6; }
    .instructions strong { color: #4a5568; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">MediTok</div>
  <h1>Voice Recorder</h1>
  <p class="subtitle">Record your voice, then upload to Swagger</p>

  <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎤</button>
  <div class="status" id="status">Click the mic to start recording</div>
  <div class="timer" id="timer">0:00</div>

  <audio id="audioPlayer" controls></audio>
  <button class="download-btn" id="downloadBtn">⬇ Download Recording</button>

  <div class="instructions">
    <p>
      <strong>How to use:</strong><br>
      1. Click 🎤 and speak your answer<br>
      2. Click again to stop<br>
      3. Download the file<br>
      4. Upload it to <strong>POST /api/v1/voice/transcribe/</strong> in Swagger
    </p>
  </div>
</div>

<script>
  let mediaRecorder, audioChunks = [], timerInterval, seconds = 0, audioBlob;

  async function toggleRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
        const url = URL.createObjectURL(audioBlob);
        const player = document.getElementById('audioPlayer');
        player.src = url;
        player.style.display = 'block';

        const btn = document.getElementById('downloadBtn');
        btn.style.display = 'block';
        btn.onclick = () => {
          const a = document.createElement('a');
          a.href = url;
          a.download = 'meditok_recording.wav';
          a.click();
        };

        stream.getTracks().forEach(t => t.stop());
      };

      mediaRecorder.start();
      seconds = 0;
      timerInterval = setInterval(() => {
        seconds++;
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }, 1000);

      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹';
      document.getElementById('status').textContent = 'Recording... click to stop';
      document.getElementById('timer').classList.add('recording');
      document.getElementById('audioPlayer').style.display = 'none';
      document.getElementById('downloadBtn').style.display = 'none';
    } catch (e) {
      document.getElementById('status').textContent = 'Microphone access denied.';
    }
  }

  function stopRecording() {
    mediaRecorder.stop();
    clearInterval(timerInterval);
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('status').textContent = 'Recording saved — download below';
    document.getElementById('timer').classList.remove('recording');
  }
</script>
</body>
</html>
